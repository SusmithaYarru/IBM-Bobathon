  #     - ./java/hl7-segment-parser.jar:/home/aceuser/ace-server/shared-classes/hl7-segment-parser.jar
  #   environment:
  #     LICENSE: accept
  #     ACE_SERVER_NAME: HL7StarterKit
  #     MQ_QMGR_HOST: mq
  #     MQ_QMGR_PORT: 1414
  #     MQ_QMGR_NAME: QM1
